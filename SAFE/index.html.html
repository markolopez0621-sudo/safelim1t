<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeLimit∞ Business Pro</title>
  
  <link rel="icon" type="image/png" href="safelimit-icon.png">
  <link rel="apple-touch-icon" href="safelimit-icon.png">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  
  <style>
    :root {
      --bg-app: #121214;
      --card-bg: #1e1e20;
      --text-main: #f1f1f1;
      --text-muted: #a1a1aa;
      --border-color: #2d2d30;
      --safe: #22c55e;
      --warn: #eab308;
      --danger: #ef4444;
      --brand: #c9a227; /* Tono Dorado Premium del logo */
      --current-color: var(--safe);
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-app);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      padding: 30px 15px;
      margin: 0;
      min-height: 100vh;
    }

    .dashboard { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 22px;
    }

    .card-annual { border-left: 4px solid var(--brand); background: linear-gradient(145deg, #1e1e20, #161618); }
    .card-monthly { border-top: 4px solid var(--current-color); }

    .label-caps { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 8px; display: block; }
    .monto-grande { font-size: 2.8rem; font-weight: 800; text-align: center; margin: 12px 0; color: var(--current-color); letter-spacing: -2px; }

    /* Barras de Progreso */
    .progress-bg { background: #2d2d30; border-radius: 999px; height: 10px; overflow: hidden; border: 1px solid #333; margin: 10px 0; }
    .progress-bar { height: 100%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }

    /* Inputs y Botones */
    .form-registro { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
    input, select { 
      background: #161618; border: 1px solid var(--border-color); color: white; 
      padding: 14px; border-radius: 12px; font-family: inherit; font-size: 14px; outline: none;
    }
    input:focus { border-color: var(--brand); }
    .btn-add { background: var(--brand); color: #000; font-weight: 800; border: none; padding: 16px; border-radius: 14px; cursor: pointer; font-size: 15px; }

    /* Lista de Items */
    .history-item { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 15px; border-bottom: 1px solid var(--border-color); 
    }
    .item-facturado { border-left: 4px solid var(--brand); background: rgba(201, 162, 39, 0.05); }
    
    .btn-check { 
      width: 30px; height: 30px; border-radius: 8px; border: 1px solid #444; 
      background: transparent; color: #444; cursor: pointer; font-weight: 800;
    }
    .btn-check.active { background: var(--brand); border-color: var(--brand); color: #000; }

    .btn-excel { 
      background: transparent; border: 1px solid var(--brand); color: var(--brand); 
      padding: 14px; border-radius: 14px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="dashboard">
    <div style="display:flex; gap:10px;">
      <select id="sel-mes" onchange="actualizarUI()" style="flex:2"></select>
      <select id="sel-ano" onchange="actualizarUI()" style="flex:1"></select>
    </div>

    <div class="card card-annual">
      <span class="label-caps">Control Anual de Suspensión (2026-2030)</span>
      <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <span id="txt-total-ano" style="font-size: 1.6rem; font-weight: 800;">S/ 0.00</span>
        <span id="txt-porc-ano" style="font-size: 11px; color: var(--text-muted);">0% del límite</span>
      </div>
      <div class="progress-bg">
        <div id="bar-ano" class="progress-bar" style="width: 0%; background: var(--brand);"></div>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:9px; color:var(--text-muted);">
        <span>Base Cero</span>
        <span>Límite SUNAT: S/ 48,125</span>
      </div>
    </div>

    <div class="card card-monthly">
      <span class="label-caps" id="lbl-mes-ano">CARGANDO...</span>
      <div class="monto-grande" id="txt-total-mes">0.00</div>
      
      <div class="progress-bg">
        <div id="bar-mes" class="progress-bar" style="width: 0%; background: var(--current-color);"></div>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:10px; color:var(--text-muted);">
        <span id="txt-porc-mes">0%</span>
        <span>Límite Mensual: S/ 4,010</span>
      </div>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
        <div style="background:#161618; padding:12px; border-radius:12px; border:1px solid #333;">
          <span class="label-caps" style="font-size:8px;">Impuesto (8%)</span>
          <span id="txt-tax" style="font-weight:700; color:var(--danger);">S/ 0.00</span>
        </div>
        <div style="background:#161618; padding:12px; border-radius:12px; border:1px solid #333;">
          <span class="label-caps" style="font-size:8px;">Por Facturar</span>
          <span id="txt-pend" style="font-weight:700; color:var(--brand);">S/ 0.00</span>
        </div>
      </div>

      <div class="form-registro">
        <div style="display:flex; gap:8px;">
          <input type="number" id="in-monto" placeholder="S/ Monto" style="flex:1">
          <input type="text" id="in-desc" placeholder="Nombre del Logo" style="flex:2">
        </div>
        <div style="display:flex; gap:8px;">
          <input type="text" id="in-doc" placeholder="DNI / RUC Cliente" style="flex:1">
          <input type="url" id="in-link" placeholder="Enlace Drive del Arte" style="flex:1">
        </div>
        <button class="btn-add" onclick="registrar()">GUARDAR EN LIBRO CONTABLE</button>
      </div>
    </div>

    <div class="card">
      <span class="label-caps">Registro de Ventas y Servicios</span>
      <div id="historia" style="max-height: 350px; overflow-y: auto;"></div>
      <button class="btn-excel" onclick="exportarExcelV4()">EXPORTAR AUDITORÍA MAESTRA (.XLSX)</button>
    </div>
  </div>

  <script>
    const DIRIS = 2000;
    const TOPE_M = 4010;
    const TOPE_A = 48125;
    const MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
    
    let db = JSON.parse(localStorage.getItem('SL_ULTRA_2030')) || {};
    let anoAct = new Date().getFullYear();
    let mesAct = new Date().getMonth();

    function init() {
      const sm = document.getElementById('sel-mes');
      const sa = document.getElementById('sel-ano');
      MESES.forEach((m,i) => sm.add(new Option(m,i)));
      for(let i=0; i<5; i++) sa.add(new Option(2026+i, 2026+i));
      sm.value = mesAct;
      sa.value = 2026;
      actualizarUI();
    }

    function registrar() {
      const m = parseFloat(document.getElementById('in-monto').value);
      const d = document.getElementById('in-desc').value || "Diseño de Logo";
      const doc = document.getElementById('in-doc').value || "---";
      const l = document.getElementById('in-link').value || "";

      if(m > 0) {
        if(!db[anoAct]) db[anoAct] = {};
        if(!db[anoAct][mesAct]) db[anoAct][mesAct] = [];
        db[anoAct][mesAct].push({ id:Date.now(), a:m, desc:d, doc:doc, link:l, fact:false, fecha:new Date().toLocaleDateString('es-PE') });
        save();
        document.getElementById('in-monto').value = '';
        document.getElementById('in-desc').value = '';
        document.getElementById('in-doc').value = '';
        document.getElementById('in-link').value = '';
        actualizarUI();
      }
    }

    function toggleFact(id) {
      db[anoAct][mesAct] = db[anoAct][mesAct].map(x => x.id === id ? {...x, fact:!x.fact} : x);
      save(); actualizarUI();
    }

    function borrar(id) { if(confirm('¿Eliminar registro contable?')) { db[anoAct][mesAct] = db[anoAct][mesAct].filter(x => x.id!==id); save(); actualizarUI(); } }
    function save() { localStorage.setItem('SL_ULTRA_2030', JSON.stringify(db)); }

    function actualizarUI() {
      mesAct = parseInt(document.getElementById('sel-mes').value);
      anoAct = parseInt(document.getElementById('sel-ano').value);
      
      const lista = (db[anoAct] && db[anoAct][mesAct]) ? db[anoAct][mesAct] : [];
      const totalLogosMes = lista.reduce((s,x) => s + x.a, 0);
      const totalGlobalMes = totalLogosMes + DIRIS;
      
      let totalLogosAno = 0;
      if(db[anoAct]) {
        for(let m=0; m<12; m++) {
          if(db[anoAct][m]) totalLogosAno += db[anoAct][m].reduce((s,x) => s + x.a, 0);
        }
      }
      const totalGlobalAno = totalLogosAno + (DIRIS * 12);

      document.getElementById('lbl-mes-ano').innerText = `${MESES[mesAct]} ${anoAct}`;
      document.getElementById('txt-total-mes').innerText = totalLogosMes.toLocaleString('en-US', {minimumFractionDigits:2});
      
      let pMes = (totalGlobalMes / TOPE_M) * 100;
      document.getElementById('bar-mes').style.width = Math.min(pMes, 100) + "%";
      document.getElementById('txt-porc-mes').innerText = pMes.toFixed(1) + "% del límite mensual";
      
      document.getElementById('txt-total-ano').innerText = "S/ " + totalGlobalAno.toLocaleString('en-US', {minimumFractionDigits:2});
      let pAno = (totalGlobalAno / TOPE_A) * 100;
      document.getElementById('bar-ano').style.width = Math.min(pAno, 100) + "%";
      document.getElementById('txt-porc-ano').innerText = pAno.toFixed(1) + "% acumulado anual";
      
      const root = document.documentElement;
      if(totalGlobalMes > TOPE_M) root.style.setProperty('--current-color', 'var(--danger)');
      else if(totalGlobalMes > 3500) root.style.setProperty('--current-color', 'var(--warn)');
      else root.style.setProperty('--current-color', 'var(--safe)');

      const tax = totalGlobalMes > TOPE_M ? totalGlobalMes * 0.08 : 0;
      document.getElementById('txt-tax').innerText = "S/ " + tax.toFixed(2);
      const pend = lista.filter(x => !x.fact).reduce((s,x) => s + x.a, 0);
      document.getElementById('txt-pend').innerText = "S/ " + pend.toFixed(2);

      const cont = document.getElementById('historia');
      cont.innerHTML = lista.length ? '' : '<p style="text-align:center;font-size:12px;color:#666;margin-top:20px;">Sin transacciones.</p>';
      [...lista].reverse().forEach(x => {
        cont.innerHTML += `
          <div class="history-item ${x.fact ? 'item-facturado' : ''}">
            <div style="display:flex; align-items:center; gap:12px;">
              <button class="btn-check ${x.fact ? 'active' : ''}" onclick="toggleFact(${x.id})">✓</button>
              <div>
                <span style="display:block; font-size:14px; font-weight:600;">${x.desc}</span>
                <span style="font-size:10px; color:#666;">Doc: ${x.doc}</span>
              </div>
            </div>
            <div style="text-align:right;">
              <span style="font-weight:700;">S/ ${x.a.toFixed(2)}</span>
              <button onclick="borrar(${x.id})" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:16px; margin-left:12px;">×</button>
            </div>
          </div>`;
      });
    }

    async function exportarExcelV4() {
      const lista = (db[anoAct] && db[anoAct][mesAct]) ? db[anoAct][mesAct] : [];
      if(!lista.length) return alert("Libro vacío.");

      const wb = new ExcelJS.Workbook();
      const ws = wb.addWorksheet('REPORTE_AUDITORIA');

      ws.columns = [
        { header: 'FECHA', key: 'fecha', width: 15 },
        { header: 'DNI / RUC', key: 'doc', width: 15 },
        { header: 'CONCEPTO', key: 'desc', width: 40 },
        { header: 'ESTADO RHE', key: 'fact', width: 15 },
        { header: 'BRUTO', key: 'a', width: 15 },
        { header: 'IMPUESTO (8%)', key: 'tax', width: 15 },
        { header: 'NETO', key: 'net', width: 15 },
        { header: 'DRIVE SUSTENTO', key: 'link', width: 35 }
      ];

      const head = ws.getRow(1);
      head.font = { bold:true, color:{argb:'FFFFFFFF'} };
      head.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FF222225'} };
      head.alignment = { horizontal:'center' };

      const totalLogosMes = lista.reduce((s,x) => s + x.a, 0);
      const aplicaImpuesto = (totalLogosMes + DIRIS) > TOPE_M;

      lista.forEach((x, i) => {
        const taxVal = aplicaImpuesto ? x.a * 0.08 : 0;
        const row = ws.addRow({
          fecha: x.fecha,
          doc: x.doc,
          desc: x.desc,
          fact: x.fact ? 'FACTURADO' : 'PENDIENTE',
          a: x.a,
          tax: taxVal,
          net: x.a - taxVal,
          link: x.link ? { text: 'Abrir Arte', hyperlink: x.link } : 'N/A'
        });

        if(i % 2 === 0) row.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFF8FAF9'} };
        ['a','tax','net'].forEach(c => row.getCell(c).numFmt = '"S/" #,##0.00');
        row.getCell('fact').font = { bold:true, color: { argb: x.fact ? 'FF22C55E' : 'FFD97706' } };
        if(x.link) row.getCell('link').font = { color:{argb:'FF2563EB'}, underline:true };
      });

      const totalRow = ws.addRow({
        fecha: '', doc: '', desc: 'TOTAL ACUMULADO DEL MES (LOGOS)', fact: '',
        a: totalLogosMes, 
        tax: aplicaImpuesto ? totalLogosMes * 0.08 : 0, 
        net: aplicaImpuesto ? totalLogosMes * 0.92 : totalLogosMes
      });
      totalRow.font = { bold:true, size:12 };
      totalRow.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFE2E8F0'} };
      ['a','tax','net'].forEach(c => totalRow.getCell(c).numFmt = '"S/" #,##0.00');

      const buffer = await wb.xlsx.writeBuffer();
      saveAs(new Blob([buffer]), `SafeLimit_Auditoria_${MESES[mesAct]}_${anoAct}.xlsx`);
    }

    init();
  </script>
</body>
</html>
